 <span id="activity-content"></span> <br>

<script type="text/javascript">
    async function typewriter(text, elementId, waitAfter) {
        var n = 0,
            isTag = false
        addText = "";
        const el = document.getElementById(elementId);

        const wait = () => new Promise(r => setTimeout(r, waitAfter));
        const nowait = () => new Promise(r => r());

        const render = () => el.innerHTML = (text.slice(0, n + 1) + addText);

        const cursor = document.createElement('span');
        cursor.id = "blink";

        el.style.setProperty("--cursor-visibility", "visible");
        while (n < text.length) {
            if (text.charAt(n + 1) === "<") isTag = true;
            if (text.charAt(n + 1) === ">") isTag = false;

            if (isTag) {
                n++;
                continue;
            }

            requestAnimationFrame(render);

            if (waitAfter === 0) {
                await nowait();
            } else {
                await wait();
            }

            n++;
        }
        el.style.setProperty("--cursor-visibility", "collapse");
    }

    function parseDelay(d) {
        const parsed = parseInt(d, 10);
        if (isNaN(parsed)) return 0;
        return parsed;
    }

    const titleDelay = parseDelay("15"),
        contentDelay = parseDelay("0");
    const typeeffetct = async () => {
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003eSwitch to Firefox\u003c\/h1\u003e\u003c\/span\u003e", "activity-title", titleDelay);
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003chr\u003e\n\u003cp\u003eI have always been a privacy ever since I got in to computer science and found out how the industry work. That is why I love Firefox for it\u0026rsquo;s open-source nature. No trackers, no telemetry, and the code is publicly avaiable to view for users to check if there are malicious codes in there. But with the recent uproar of the new updates for Google Chrome, you might think Firefox will be the browser for you.\u003c\/p\u003e\n\u003chr\u003e\n\u003ch2 id=\u0022why-you-should-switch-to-using-firefox\u0022\u003eWhy you should switch to using Firefox?\u003c\/h2\u003e\n\u003cp\u003eChrome or Google Chrome, as many people know, is making a huge change on how their extensions work. Google Chrome is a browser developed by Google and is one of the most used browser as of today. But with their new update, Google Chrome and other Chromium-based browsers\u0026rsquo; extensions will be much less capable interacting with the browser itself. These extensions includes the ability to block trackers and ads.\u003c\/p\u003e\n\u003ch2 id=\u0022why-is-this-happening\u0022\u003eWhy is this Happening?\u003c\/h2\u003e\n\u003cp\u003eExtensions, from back then until the present, could interact with browsers. But it has been one of the main attack points on users from malicious extensions. At the same time, Google is an advertisement and tracking company, so the conflict in interest is obvious. Providing a browser that is inherently less capable in blocking trackers is profitable for them.\u003c\/p\u003e\n\u003ch2 id=\u0022why-should-you-care-about-this\u0022\u003eWhy should you care about this?\u003c\/h2\u003e\n\u003cp\u003eBesides being annoyance to us, ads work even if you think they don\u0026rsquo;t. Global advertising spendings are moving forwards 1 trillion US-dollars per year. Your \u003cstrong\u003ePrivacy\u003c\/strong\u003e is important! Tracking goes much further than you probably think. Your browsing, location, usage, app, and medical history (if you use certain medical apps) are all tracked. Not only should you not accept this level of intrusion, it can, has and will be used \u003cstrong\u003emaliciously\u003c\/strong\u003e. Examples include misinformation campaigns and police investigations due to period cycle information. Advertisement agesnt can be vectors for malicious code. The will also slow down you device due to the additional load of data that has to be transferred, loaded, and displayed.\u003c\/p\u003e\n\u003ch2 id=\u0022what-should-you-do\u0022\u003eWhat should you do?\u003c\/h2\u003e\n\u003cp\u003eGoogle\u0026rsquo;s ability to push changes like this relies on their quasi-monopoly in the browser space and will impact the majority of internet users.\u003c\/p\u003e\n\u003cp\u003e\u003cimg src=\u0022https:\/\/scontent.fmnl8-2.fna.fbcdn.net\/v\/t1.15752-9\/304956943_5354732694643108_4005238764700770277_n.png?_nc_cat=103\u0026amp;ccb=1-7\u0026amp;_nc_sid=ae9488\u0026amp;_nc_ohc=uukcE9mKfwsAX_p1mce\u0026amp;tn=v5OvBrYjXzv5FgQx\u0026amp;_nc_ht=scontent.fmnl8-2.fna\u0026amp;oh=03_AVLJcu3NzYeqIIo-0twVFqhaFfoPetUv65NxBuEbKIIwzQ\u0026amp;oe=63576EA6\u0022 alt=\u0022Statistics\u0022\u003e\n[^]: Statistics from W3Counter Web Browser Market Share August 2022\u003c\/p\u003e\n\u003cp\u003eDeveloping browsers is expensive and complicated. This means that both that we won\u0026rsquo;t see any truly new browsers emerge from any of this and that changing a Chromium derivative enough to truly stave off Google\u0026rsquo;s influence is impossible.\u003c\/p\u003e\n\u003cp\u003eThus, Chromium derivatives uphold Google\u0026rsquo;s quasi-monopoly and might be unable to find a way around future changes with a similar direction. Even if they find a way around this current change; Brave, Vivaldi, Edge, Opera are all derivatives of Chromium.\u003c\/p\u003e\n\u003cp\u003eInstead, consider switching to Firefox or a Firefox-based browser like my personal favorite, Librewolf (which I\u0026rsquo;m going to explain a bit further with another article in the future).\u003c\/p\u003e\n\u003cp\u003eDepending on your interest in this topic, the switch can be as easy as installing Firefox, exporting your data from Chrome, importing it to Firefox and installing uBlock Origin (the top adblocking extension available).\u003c\/p\u003e\n\u003chr\u003e\n\u003cp\u003eThat is all you have to know to make the switch to Firefox today!\u003c\/p\u003e\n\u003c\/span\u003e", "activity-content", contentDelay);
        return;
    }

    typeeffetct()
</script>
